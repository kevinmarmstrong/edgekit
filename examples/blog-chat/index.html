<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask Kevin — Browser Chat Runtime Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
      max-width: 600px;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    header p {
      color: #666;
      line-height: 1.5;
    }

    #chat-container {
      width: 100%;
      max-width: 640px;
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.8rem;
      color: #999;
    }

    footer a {
      color: #0066cc;
      text-decoration: none;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #111; color: #e0e0e0; }
      header p { color: #999; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Ask Kevin</h1>
    <p>Chat with this blog using AI that runs entirely in your browser. No data leaves your device.</p>
  </header>

  <div id="chat-container"></div>

  <footer>
    Powered by <a href="https://github.com/anthropics/edgekit">edgekit</a>
  </footer>

  <script type="module" src="./main.ts"></script>
</body>
</html>
