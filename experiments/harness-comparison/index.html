<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>edgekit harness comparison — baseline vs tool-first (Gemma)</title>
    <style>
      body { font: 14px/1.5 system-ui, sans-serif; max-width: 980px; margin: 24px auto; padding: 0 16px; color: #1f2328; }
      h1 { font-size: 20px; }
      #status { background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 6px; padding: 10px 12px; margin: 12px 0; }
      .controls { display: flex; gap: 16px; align-items: center; margin: 12px 0; flex-wrap: wrap; }
      button { background: #1f883d; color: #fff; border: 0; border-radius: 6px; padding: 8px 16px; font-weight: 600; cursor: pointer; }
      .row { border: 1px solid #d0d7de; border-radius: 8px; padding: 12px 14px; margin: 12px 0; }
      .row h3 { margin: 0 0 4px; font-size: 15px; }
      .row small { color: #656d76; font-weight: 400; }
      .prompt { color: #424a53; font-style: italic; margin-bottom: 8px; }
      .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .col { background: #f6f8fa; border-radius: 6px; padding: 8px 10px; }
      code { font-size: 12px; color: #0550ae; word-break: break-all; }
      .text { color: #424a53; font-size: 12px; margin-top: 6px; white-space: pre-wrap; }
      #summary { border-top: 2px solid #d0d7de; margin-top: 20px; }
      .decide { background: #fff8c5; border: 1px solid #d4a72c55; border-radius: 6px; padding: 8px 10px; }
    </style>
  </head>
  <body>
    <h1>edgekit harness comparison — baseline vs. tool-first</h1>
    <p>
      Runs <strong id="taskCount">?</strong> labelled canary tasks through edgekit's real
      <code>createAgent</code> twice: a plain <em>baseline</em> and a <em>tool-first</em> variant
      (feasibility gate + tool-first primer + two-strikes stop). Same model both times.
    </p>
    <div id="status">Detecting capabilities…</div>
    <div class="controls">
      <label><input type="radio" name="provider" value="chrome" checked /> Chrome AI / Gemini Nano (Gemma, zero download)</label>
      <label><input type="radio" name="provider" value="webllm" /> WebLLM Gemma 2 2B (downloads ~1.4 GB)</label>
      <button id="runBtn">Run comparison</button>
    </div>
    <div id="summary"></div>
    <div id="results"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
